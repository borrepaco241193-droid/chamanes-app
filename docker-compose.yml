version: '3.9'

# ============================================================
# Chamanes — Local Development Environment
# Run: docker compose up -d
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: chamanes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chamanes
      POSTGRES_PASSWORD: chamanes_dev_password
      POSTGRES_DB: chamanes_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chamanes -d chamanes_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chamanes_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass chamanes_redis_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', 'chamanes_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run backend in Docker locally
  # backend:
  #   build:
  #     context: ./apps/backend
  #     dockerfile: Dockerfile
  #   container_name: chamanes_backend
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: postgresql://chamanes:chamanes_dev_password@postgres:5432/chamanes_dev
  #     REDIS_URL: redis://:chamanes_redis_password@redis:6379
  #   env_file:
  #     - .env
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
